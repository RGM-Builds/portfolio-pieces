<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alameda County Shelter Standards — Training Hub</title>
<style>
  :root{
    --ink:#1c2521;
    --ink-soft:#4a564f;
    --paper:#f7f5ef;
    --paper-raised:#ffffff;
    --line:#d8d3c4;
    --moss:#3d5c45;
    --moss-deep:#27402c;
    --moss-pale:#e4ebe1;
    --rust:#b5562f;
    --rust-pale:#f5e1d6;
    --gold:#b3892f;
    --gold-pale:#f3e8cf;
    --slate:#3a5066;
    --slate-pale:#e1e8ee;
    --berry:#8a3450;
    --berry-pale:#f1dde4;
    --ok:#3d6b3f;
    --ok-pale:#e3eee0;
    --bad:#a23b2e;
    --bad-pale:#f6e0db;
    --radius:10px;
    --radius-lg:16px;
    --serif: "Iowan Old Style","Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
    --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono: "SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    line-height:1.5;
    min-height:100vh;
  }
  #app{max-width:920px;margin:0 auto;padding:0 20px 80px;}

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    padding:18px 0 14px;
    margin-bottom:8px;
  }
  .topbar-inner{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .brand{display:flex;align-items:baseline;gap:10px;cursor:pointer;}
  .brand .mark{
    font-family:var(--serif);
    font-weight:700;
    font-size:22px;
    color:var(--moss-deep);
    letter-spacing:0.5px;
  }
  .brand .tag{font-size:12px;color:var(--ink-soft);letter-spacing:0.06em;text-transform:uppercase;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .who{font-size:13px;color:var(--ink-soft);}
  .who b{color:var(--ink);font-weight:600;}
  .btn-link{
    background:none;border:none;color:var(--moss-deep);font-size:13px;font-weight:600;
    cursor:pointer;padding:6px 10px;border-radius:6px;text-decoration:underline;
  }
  .btn-link:hover{background:var(--moss-pale);}

  /* ---------- generic buttons ---------- */
  button{font-family:var(--sans);}
  .btn{
    appearance:none;border:1px solid var(--line);background:var(--paper-raised);
    color:var(--ink);padding:10px 18px;border-radius:8px;font-size:14px;font-weight:600;
    cursor:pointer;transition:transform .08s ease, background .15s ease, border-color .15s ease;
  }
  .btn:hover{background:var(--moss-pale);border-color:var(--moss);}
  .btn:active{transform:scale(.97);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{background:var(--moss-deep);color:#fff;border-color:var(--moss-deep);}
  .btn-primary:hover{background:var(--moss);border-color:var(--moss);}
  .btn-ghost{background:transparent;border-color:transparent;}
  .btn-ghost:hover{background:var(--moss-pale);}
  .btn-sm{padding:6px 12px;font-size:13px;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}

  /* ---------- screens ---------- */
  .screen{animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- gate / login ---------- */
  .gate-wrap{
    min-height:80vh;display:flex;align-items:center;justify-content:center;
  }
  .gate-card{
    max-width:440px;width:100%;background:var(--paper-raised);
    border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:36px 32px;text-align:left;
  }
  .gate-card h1{
    font-family:var(--serif);font-size:26px;margin:0 0 6px;color:var(--moss-deep);
  }
  .gate-card p.sub{color:var(--ink-soft);font-size:14px;margin:0 0 26px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase;}
  .field input, .field select{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:15px;background:#fff;color:var(--ink);
  }
  .field input:focus, .field select:focus{outline:2px solid var(--moss);outline-offset:1px;}
  .role-toggle{display:flex;gap:8px;margin-bottom:18px;}
  .role-btn{
    flex:1;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff;
    cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-soft);text-align:center;
  }
  .role-btn.active{background:var(--moss-deep);color:#fff;border-color:var(--moss-deep);}
  .gate-error{color:var(--bad);font-size:13px;margin-top:10px;display:none;}

  /* ---------- hub ---------- */
  .hub-hero{
    padding:22px 0 6px;
  }
  .hub-hero h1{
    font-family:var(--serif);font-size:30px;margin:0 0 8px;color:var(--moss-deep);
  }
  .hub-hero p{color:var(--ink-soft);font-size:15px;max-width:600px;margin:0;}

  .stat-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:22px 0 30px;}
  .stat-card{
    background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px 16px;
  }
  .stat-card .n{font-family:var(--serif);font-size:24px;color:var(--moss-deep);font-weight:700;}
  .stat-card .l{font-size:11.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}

  .section-label{
    font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
    color:var(--ink-soft);margin:30px 0 14px;display:flex;align-items:center;gap:10px;
  }
  .section-label::after{content:"";flex:1;height:1px;background:var(--line);}

  .module-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:640px){.module-grid{grid-template-columns:1fr;} .stat-strip{grid-template-columns:repeat(2,1fr);}}

  .mod-card{
    background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:18px 18px 16px;cursor:pointer;position:relative;overflow:hidden;
    transition:border-color .15s ease, transform .1s ease;
    display:flex;flex-direction:column;gap:8px;
  }
  .mod-card:hover{border-color:var(--moss);transform:translateY(-1px);}
  .mod-card .bar{position:absolute;left:0;top:0;bottom:0;width:5px;}
  .mod-card .num{font-family:var(--serif);font-size:13px;color:var(--ink-soft);font-weight:700;}
  .mod-card h3{margin:0;font-size:16.5px;font-weight:700;color:var(--ink);line-height:1.3;}
  .mod-card .desc{font-size:13px;color:var(--ink-soft);line-height:1.45;}
  .mod-card .meta-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
  .pill{
    font-size:11px;font-weight:700;padding:4px 9px;border-radius:99px;letter-spacing:.02em;
  }
  .pill-done{background:var(--ok-pale);color:var(--ok);}
  .pill-progress{background:var(--gold-pale);color:var(--gold);}
  .pill-new{background:var(--slate-pale);color:var(--slate);}
  .pill-locked{background:#eceae2;color:#9b9684;}
  .score-chip{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .score-chip.pass{color:var(--ok);}
  .score-chip.fail{color:var(--bad);}

  /* progress bar */
  .pbar{height:5px;background:var(--moss-pale);border-radius:99px;overflow:hidden;margin-top:6px;}
  .pbar > div{height:100%;background:var(--moss);border-radius:99px;transition:width .3s ease;}

  /* ---------- module detail / lesson viewer ---------- */
  .crumbs{font-size:13px;color:var(--ink-soft);margin-bottom:14px;}
  .crumbs button{background:none;border:none;color:var(--moss-deep);font-weight:600;cursor:pointer;font-size:13px;text-decoration:underline;padding:0;}

  .mod-header{margin-bottom:24px;}
  .mod-header .eyebrow{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;font-weight:700;}
  .mod-header h1{font-family:var(--serif);font-size:28px;margin:6px 0 8px;color:var(--moss-deep);}
  .mod-header p{color:var(--ink-soft);font-size:15px;max-width:640px;}

  .lesson-list{display:flex;flex-direction:column;gap:10px;margin:20px 0;}
  .lesson-row{
    display:flex;align-items:center;gap:14px;background:var(--paper-raised);
    border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;
    cursor:pointer;transition:border-color .15s;
  }
  .lesson-row:hover{border-color:var(--moss);}
  .lesson-row .check{
    width:26px;height:26px;border-radius:50%;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:transparent;
  }
  .lesson-row.done .check{background:var(--moss);border-color:var(--moss);color:#fff;}
  .lesson-row .ltext{flex:1;}
  .lesson-row .ltitle{font-weight:600;font-size:14.5px;}
  .lesson-row .lsub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .lesson-row .arrow{color:var(--ink-soft);font-size:16px;}

  .quiz-cta{
    margin-top:24px;background:var(--moss-pale);border:1px solid var(--moss);border-radius:var(--radius-lg);
    padding:20px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  }
  .quiz-cta .qtext h3{margin:0 0 4px;font-size:16px;color:var(--moss-deep);}
  .quiz-cta .qtext p{margin:0;font-size:13px;color:var(--ink-soft);}

  /* ---------- lesson content screen ---------- */
  .lesson-progress-bar{height:4px;background:var(--moss-pale);border-radius:99px;margin-bottom:24px;overflow:hidden;}
  .lesson-progress-bar > div{height:100%;background:var(--moss);transition:width .3s ease;}
  .lesson-card{
    background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:30px 32px;min-height:280px;
  }
  .lesson-card .ltag{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--moss);}
  .lesson-card h2{font-family:var(--serif);font-size:23px;margin:8px 0 16px;color:var(--ink);}
  .lesson-card .body{font-size:15.5px;line-height:1.7;color:var(--ink);}
  .lesson-card .body p{margin:0 0 14px;}
  .lesson-card .body ul, .lesson-card .body ol{margin:0 0 14px;padding-left:22px;}
  .lesson-card .body li{margin-bottom:6px;}
  .lesson-card .body strong{color:var(--moss-deep);}
  .callout{
    border-left:3px solid var(--gold);background:var(--gold-pale);padding:12px 16px;
    border-radius:0 8px 8px 0;font-size:14px;margin:16px 0;color:#5c4717;
  }
  .callout.scenario{border-left-color:var(--slate);background:var(--slate-pale);color:#1e2f3f;}
  .callout.warn{border-left-color:var(--rust);background:var(--rust-pale);color:#6b2c14;}
  .callout b{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;opacity:.85;}

  .check-interaction{
    margin-top:20px;border-top:1px dashed var(--line);padding-top:18px;
  }
  .check-q{font-weight:600;font-size:14.5px;margin-bottom:10px;}
  .opt-list{display:flex;flex-direction:column;gap:8px;}
  .opt-btn{
    text-align:left;border:1px solid var(--line);background:#fff;border-radius:8px;
    padding:11px 14px;font-size:14px;cursor:pointer;color:var(--ink);
  }
  .opt-btn:hover{border-color:var(--moss);}
  .opt-btn.correct{background:var(--ok-pale);border-color:var(--ok);color:#244a26;}
  .opt-btn.incorrect{background:var(--bad-pale);border-color:var(--bad);color:#6e2419;}
  .opt-btn.dim{opacity:.55;}
  .feedback-note{font-size:13.5px;margin-top:10px;padding:10px 12px;border-radius:8px;}
  .feedback-note.good{background:var(--ok-pale);color:#244a26;}
  .feedback-note.bad{background:var(--bad-pale);color:#6e2419;}

  .lesson-nav{display:flex;justify-content:space-between;margin-top:22px;}

  /* ---------- quiz ---------- */
  .quiz-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .quiz-head h2{font-family:var(--serif);font-size:22px;margin:0;color:var(--moss-deep);}
  .quiz-counter{font-size:13px;color:var(--ink-soft);font-weight:600;}
  .quiz-progress{height:5px;background:var(--moss-pale);border-radius:99px;margin-bottom:26px;overflow:hidden;}
  .quiz-progress > div{height:100%;background:var(--moss);transition:width .3s ease;}

  .quiz-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius-lg);padding:30px 32px;}
  .quiz-card .qkind{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--berry);margin-bottom:8px;}
  .quiz-card .qprompt{font-size:17px;font-weight:600;line-height:1.5;margin-bottom:20px;}
  .quiz-card .qscenario{font-size:14px;color:var(--ink-soft);background:var(--paper);border-radius:8px;padding:12px 14px;margin-bottom:16px;line-height:1.6;}

  .quiz-opts{display:flex;flex-direction:column;gap:10px;}
  .quiz-opt{
    display:flex;align-items:flex-start;gap:12px;border:1.5px solid var(--line);border-radius:10px;
    padding:13px 15px;cursor:pointer;background:#fff;transition:border-color .12s, background .12s;
  }
  .quiz-opt:hover{border-color:var(--moss);}
  .quiz-opt .letter{
    width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700;
    flex-shrink:0;color:var(--ink-soft);
  }
  .quiz-opt .otext{font-size:14.5px;line-height:1.5;padding-top:1px;}
  .quiz-opt.selected{border-color:var(--moss);background:var(--moss-pale);}
  .quiz-opt.selected .letter{background:var(--moss);border-color:var(--moss);color:#fff;}
  .quiz-opt.reveal-correct{border-color:var(--ok);background:var(--ok-pale);}
  .quiz-opt.reveal-correct .letter{background:var(--ok);border-color:var(--ok);color:#fff;}
  .quiz-opt.reveal-incorrect{border-color:var(--bad);background:var(--bad-pale);}
  .quiz-opt.reveal-incorrect .letter{background:var(--bad);border-color:var(--bad);color:#fff;}

  .quiz-explain{
    margin-top:18px;padding:14px 16px;border-radius:10px;font-size:14px;line-height:1.6;
  }
  .quiz-explain.good{background:var(--ok-pale);color:#1f3f21;}
  .quiz-explain.bad{background:var(--bad-pale);color:#5c1f15;}
  .quiz-explain .qe-label{font-weight:700;display:block;margin-bottom:4px;}
  .quiz-explain .qe-cite{font-size:12.5px;opacity:.8;margin-top:6px;font-style:italic;}

  .quiz-footer{display:flex;justify-content:flex-end;margin-top:24px;}

  /* ---------- results ---------- */
  .result-wrap{text-align:center;padding:30px 0;}
  .result-ring{
    width:140px;height:140px;border-radius:50%;margin:0 auto 20px;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    border:8px solid var(--moss-pale);position:relative;
  }
  .result-ring .pct{font-family:var(--serif);font-size:34px;font-weight:700;color:var(--moss-deep);}
  .result-ring .of{font-size:12px;color:var(--ink-soft);}
  .result-ring.pass{border-color:var(--ok);}
  .result-ring.fail{border-color:var(--bad);}
  .result-title{font-family:var(--serif);font-size:24px;margin:0 0 8px;}
  .result-sub{color:var(--ink-soft);font-size:14.5px;max-width:440px;margin:0 auto 24px;}
  .miss-list{text-align:left;max-width:560px;margin:0 auto 20px;background:var(--paper-raised);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
  .miss-list h4{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);}
  .miss-item{font-size:14px;padding:8px 0;border-top:1px solid var(--line);}
  .miss-item:first-of-type{border-top:none;}

  /* ---------- remediation ---------- */
  .remed-card{background:var(--gold-pale);border:1px solid var(--gold);border-radius:var(--radius-lg);padding:26px 28px;margin-bottom:20px;}
  .remed-card .rtag{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#7a5b1f;}
  .remed-card h2{font-family:var(--serif);font-size:21px;margin:6px 0 12px;color:#5c4717;}
  .remed-card .rbody{font-size:14.5px;line-height:1.65;color:#4a3a12;}
  .remed-card .rbody p{margin:0 0 12px;}
  .remed-card .rbody strong{color:#3a2c0a;}

  /* ---------- moderator dashboard ---------- */
  .mod-dash-table{width:100%;border-collapse:collapse;font-size:13.5px;}
  .mod-dash-table th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;
    color:var(--ink-soft);padding:8px 10px;border-bottom:2px solid var(--line);
  }
  .mod-dash-table td{padding:9px 10px;border-bottom:1px solid var(--line);}
  .mod-dash-table tr:hover td{background:var(--paper);}
  .score-badge{font-weight:700;padding:3px 9px;border-radius:99px;font-size:12px;}
  .score-badge.pass{background:var(--ok-pale);color:var(--ok);}
  .score-badge.fail{background:var(--bad-pale);color:var(--bad);}

  .empty-state{
    text-align:center;padding:50px 20px;color:var(--ink-soft);font-size:14px;
  }

  .filter-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .chip-filter{
    border:1px solid var(--line);background:#fff;padding:6px 13px;border-radius:99px;
    font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink-soft);
  }
  .chip-filter.active{background:var(--moss-deep);color:#fff;border-color:var(--moss-deep);}

  ::selection{background:var(--moss-pale);}

  @media print{ .topbar, .btn-row { display:none; } }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============================================================
// Alameda County Shelter Standards — Training Hub content data
// Source: Shelter_Standards_June_2_for_Review.pdf
// Required trainings per Section G.6 (pages 47-48)
// ============================================================

const MODULES = [

// ======================================================================
// MODULE 1 — CONFIDENTIALITY PROTOCOLS
// ======================================================================
{
  id: "confidentiality",
  order: 1,
  color: "moss",
  dueWindow: "30 days",
  title: "Confidentiality protocols",
  short: "Protecting participant privacy in records, conversations, and disclosures.",
  description: "Participants arrive at shelter in crisis, often having lost control over their own information. This module covers how to keep records secure, what you can say and to whom, and how to respond when someone comes looking for a participant.",
  sourceRef: "Section A.10, A.7(h), A.1.3(c)",
  lessons: [
    {
      id: "c1",
      title: "Why confidentiality is a right, not a courtesy",
      minutes: 4,
      tag: "Foundation",
      body: `
        <p>Confidentiality at a shelter isn't an administrative nicety — it's a stated <strong>participant right</strong>. The standards guarantee that every participant will have their personal information treated with confidentiality, will be told when and to whom confidential information will be disclosed, and can deny disclosure unless the law requires it.</p>
        <p>For many participants, a shelter is the safest place they've been in weeks. That safety depends on staff being predictable and disciplined about who learns what. A single careless comment in a hallway — "didn't I see you at the DV shelter last month?" — can undo months of a participant's effort to stay hidden from someone dangerous.</p>
        <div class="callout"><b>Standard in plain terms</b>Participants control their own story. Staff are the gatekeepers, not the narrators.</div>
      `,
      check: {
        q: "A participant's family member calls and says they're worried and just want to know if their relative is okay. What's the correct response?",
        options: [
          "Confirm the person is safely staying at the shelter to ease the family's mind",
          "Take a message without confirming or denying the participant is there, and pass it along per shelter procedure",
          "Tell the caller to try a different shelter"
        ],
        correctIndex: 1,
        feedback: {
          correct: "Right. The standards require shelters to take messages without confirming or denying presence, then inform the participant of the contact attempt — protecting their right to decide if and when to reconnect.",
          incorrect: "Confirming presence — even with good intentions — can put a participant at risk if the caller isn't who they claim to be. The standard requires neither confirming nor denying."
        }
      }
    },
    {
      id: "c2",
      title: "Records, screens, and locked doors",
      minutes: 4,
      tag: "Practice",
      body: `
        <p>Confidentiality lives in physical habits as much as policy language. Participant files must be kept in a secure, locked location. Electronic files must be password-protected and accessed so that others can't view the screen over your shoulder.</p>
        <ul>
          <li>Step away from a computer? Lock the screen.</li>
          <li>Pulling a paper file? Return it to the locked cabinet — don't leave it on a desk during a shift change.</li>
          <li>Discussing a participant's situation with a colleague? Do it somewhere participants and visitors can't overhear.</li>
        </ul>
        <p>Before any personal information goes to an outside party — a landlord, a family member, another agency — the participant signs a <strong>Release of Information (ROI)</strong>. The ROI is part of the Program Agreement packet reviewed at intake, so participants understand from day one what disclosure looks like and that they control it.</p>
      `,
      check: {
        q: "A case manager wants to email a participant's housing application to a landlord. What must happen first?",
        options: [
          "Nothing — sharing information to help someone get housed is always allowed",
          "The participant must sign a Release of Information (ROI) authorizing that specific disclosure",
          "The case manager just needs verbal permission from their supervisor"
        ],

  }catch(e){
    console.error("storage set failed", key, e);
    return false;
  }
}
async function safeList(prefix, shared){
  try{
    const r = await window.storage.list(prefix, !!shared);
    return r ? r.keys : [];
  }catch(e){
    return [];
  }
}

// ---------------- module / progress helpers ----------------

function getModule(id){
  return MODULES.find(m => m.id === id);
}

async function getUserProgress(moduleId){
  const raw = await safeGet(progressKey(STATE.user.name, moduleId), false);
  if(!raw) return { lessonsDone: [], attempts: [] };
  try{ return JSON.parse(raw); } catch(e){ return { lessonsDone: [], attempts: [] }; }
}

async function saveUserProgress(moduleId, progress){
  await safeSet(progressKey(STATE.user.name, moduleId), JSON.stringify(progress), false);
}

async function markLessonDone(moduleId, lessonId){
  const progress = await getUserProgress(moduleId);
  if(!progress.lessonsDone.includes(lessonId)){
    progress.lessonsDone.push(lessonId);
  }
  await saveUserProgress(moduleId, progress);
}

async function recordAttempt(moduleId, result){
  // result: { date, score, passed, total, correct, missedIds, isRemediation }
  const progress = await getUserProgress(moduleId);
  progress.attempts.push(result);
  await saveUserProgress(moduleId, progress);

  // also write a "shared" moderator-visible record (private to moderator + this learner by convention;
  // moderator dashboard reads all shared score: keys, learner dashboard reads only their own progress)
  const attemptId = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  const record = {
    learner: STATE.user.name,
    moduleId: moduleId,
    moduleTitle: getModule(moduleId).title,
    date: result.date,
    score: result.score,
    passed: result.passed,
    isRemediation: !!result.isRemediation
  };
  await safeSet(scoreKey(STATE.user.name, moduleId, attemptId), JSON.stringify(record), true);

  // register learner name in a shared roster so moderator can see who has taken anything
  await registerLearnerInRoster();
}

async function registerLearnerInRoster(){
  const raw = await safeGet("roster:learners", true);
  let list = [];
  if(raw){
    try{ list = JSON.parse(raw); } catch(e){ list = []; }
  }
  if(!list.includes(STATE.user.name)){
    list.push(STATE.user.name);
    await safeSet("roster:learners", JSON.stringify(list), true);
  }
}

function bestAttempt(attempts){
  if(!attempts || attempts.length === 0) return null;
  return attempts.reduce((best, a) => (a.score > best.score ? a : best), attempts[0]);
}

async function renderHub(){
  app.innerHTML = renderTopbar() + `<div id="hub-body" class="screen"><div class="empty-state">Loading your trainings…</div></div>`;
  wireTopbar();

  // gather progress for all modules
  const moduleStatuses = [];
  for(const m of MODULES){
    const progress = await getUserProgress(m.id);
    const best = bestAttempt(progress.attempts);
    const lessonsTotal = m.lessons.length;
    const lessonsDone = progress.lessonsDone.length;
    moduleStatuses.push({ module: m, progress, best, lessonsDone, lessonsTotal });
  }

  const completedCount = moduleStatuses.filter(s => s.best && s.best.passed).length;
  const inProgressCount = moduleStatuses.filter(s => !(s.best && s.best.passed) && s.lessonsDone > 0).length;
  const notStartedCount = moduleStatuses.filter(s => s.lessonsDone === 0 && !s.best).length;
  const avgScore = (() => {
    const scored = moduleStatuses.filter(s => s.best);
    if(scored.length === 0) return null;
    return Math.round(scored.reduce((sum,s) => sum + s.best.score, 0) / scored.length);
  })();

  const cardsHtml = moduleStatuses.map(s => {
    const c = COLOR_MAP[s.module.color] || COLOR_MAP.moss;
    let pillHtml, scoreHtml = "";
    if(s.best && s.best.passed){
      pillHtml = `<span class="pill pill-done"><i class="ti ti-check" aria-hidden="true"></i> Passed</span>`;
      scoreHtml = `<span class="score-chip pass">${s.best.score}%</span>`;
    } else if(s.best && !s.best.passed){
      pillHtml = `<span class="pill pill-progress">Retake needed</span>`;
      scoreHtml = `<span class="score-chip fail">${s.best.score}%</span>`;
    } else if(s.lessonsDone > 0){
      pillHtml = `<span class="pill pill-progress">In progress</span>`;
    } else {
      pillHtml = `<span class="pill pill-new">Not started</span>`;
    }
    const pct = Math.round((s.lessonsDone / s.lessonsTotal) * 100);
    return `
      <div class="mod-card" data-module="${s.module.id}">
        <div class="bar" style="background:${c.bar};"></div>
        <div class="num">Module ${String(s.module.order).padStart(2,"0")}</div>
        <h3>${escapeHtml(s.module.title)}</h3>
        <div class="desc">${escapeHtml(s.module.short)}</div>
        <div class="pbar"><div style="width:${pct}%; background:${c.bar};"></div></div>
        <div class="meta-row">
          ${pillHtml}
          ${scoreHtml}
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("hub-body").innerHTML = `
    <div class="hub-hero">
      <h1>Required staff trainings</h1>
      <p>Nine bite-sized modules covering the trainings required within 30 days of hire under Alameda County Emergency Shelter Standards, Section G.6. Work through the lessons in each module, then take the quiz to confirm you've got it.</p>
    </div>

    <div class="stat-strip">
      <div class="stat-card"><div class="n">${completedCount}/${MODULES.length}</div><div class="l">Modules passed</div></div>
      <div class="stat-card"><div class="n">${inProgressCount}</div><div class="l">In progress</div></div>
      <div class="stat-card"><div class="n">${notStartedCount}</div><div class="l">Not started</div></div>
      <div class="stat-card"><div class="n">${avgScore === null ? "—" : avgScore + "%"}</div><div class="l">Average quiz score</div></div>
    </div>

    <div class="section-label">Your modules</div>
    <div class="module-grid">
      ${cardsHtml}
    </div>
  `;

  document.querySelectorAll(".mod-card").forEach(card => {
    card.onclick = () => {
      STATE.currentModuleId = card.getAttribute("data-module");
      STATE.screen = "module";
      render();
    };
  });
}

// ---------------- screen: QUIZ ----------------

function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(moduleId, isRemediation, focusIds){
  const m = getModule(moduleId);
  let qSet = m.quiz.questions;
  if(isRemediation && focusIds && focusIds.length > 0){
    qSet = m.quiz.questions.filter(q => focusIds.includes(q.id));
    if(qSet.length === 0) qSet = m.quiz.questions;
  }
  STATE.quiz = {
    moduleId: moduleId,
    questions: shuffle(qSet),
    answers: new Array(qSet.length).fill(null),
    currentIndex: 0,
    revealed: false,
    isRemediationRound: !!isRemediation
  };
  STATE.screen = "quiz";
  render();
}

function renderQuiz(){
  const m = getModule(STATE.quiz.moduleId);
  const qz = STATE.quiz;
  const q = qz.questions[qz.currentIndex];
  const total = qz.questions.length;
  const pct = Math.round((qz.currentIndex / total) * 100);
  const selected = qz.answers[qz.currentIndex];

  app.innerHTML = renderTopbar() + `
    <div class="screen">
      <div class="quiz-head">
        <h2>${qz.isRemediationRound ? "Retake: " : ""}${escapeHtml(m.title)} quiz</h2>
        <div class="quiz-counter">Question ${qz.currentIndex+1} of ${total}</div>
      </div>
      <div class="quiz-progress"><div style="width:${pct}%;"></div></div>

      <div class="quiz-card">
        <div class="qkind">${qz.isRemediationRound ? "Focused retake" : "Scenario check"}</div>
        <div class="qprompt">${escapeHtml(q.prompt)}</div>
        <div class="quiz-opts" id="quiz-opts">
          ${q.options.map((opt, i) => {
            let cls = "quiz-opt";
            if(qz.revealed){
              if(i === q.correctIndex) cls += " reveal-correct";
              else if(i === selected) cls += " reveal-incorrect";
            } else if(i === selected){
              cls += " selected";
            }
            return `<div class="${cls}" data-i="${i}">
              <div class="letter">${String.fromCharCode(65+i)}</div>
              <div class="otext">${escapeHtml(opt)}</div>
            </div>`;
          }).join("")}
        </div>
        <div id="quiz-explain-wrap"></div>
      </div>

      <div class="quiz-footer">
        <button class="btn btn-primary" id="quiz-next-btn" ${selected === null ? "disabled" : ""}>
          ${qz.revealed ? (qz.currentIndex === total - 1 ? "See results" : "Next question") : "Check answer"}
        </button>
      </div>
    </div>
  `;

  if(qz.revealed){
    const isCorrect = selected === q.correctIndex;
    document.getElementById("quiz-explain-wrap").innerHTML = `
      <div class="quiz-explain ${isCorrect ? "good" : "bad"}">
        <span class="qe-label">${isCorrect ? "Correct" : "Not quite"}</span>
        ${escapeHtml(q.explain)}
        <div class="qe-cite">${escapeHtml(q.cite)}</div>
      </div>
    `;
  }

  document.querySelectorAll("#quiz-opts .quiz-opt").forEach(opt => {
    opt.onclick = () => {
      if(qz.revealed) return;
      const i = parseInt(opt.getAttribute("data-i"), 10);
      qz.answers[qz.currentIndex] = i;
      render();
    };
  });

  document.getElementById("quiz-next-btn").onclick = () => {
    if(!qz.revealed){
      qz.revealed = true;
      render();
      return;
    }
    if(qz.currentIndex < total - 1){
      qz.currentIndex += 1;
      qz.revealed = false;
      render();
    } else {
      finishQuiz();
    }
  };
}

async function finishQuiz(){
  const qz = STATE.quiz;
  const m = getModule(qz.moduleId);
  let correctCount = 0;
  const missed = [];
  qz.questions.forEach((q, i) => {
    if(qz.answers[i] === q.correctIndex) correctCount++;
    else missed.push(q);
  });
  const total = qz.questions.length;
  const score = Math.round((correctCount / total) * 100);
  const passed = score >= m.quiz.passScore;

  const result = {
    date: new Date().toISOString(),
    score: score,
    correct: correctCount,
    total: total,
    passed: passed,
    missedIds: missed.map(q => q.id),
    isRemediation: qz.isRemediationRound
  };

  await recordAttempt(qz.moduleId, result);

  STATE.lastResult = result;
  STATE.lastMissedQuestions = missed;
  STATE.screen = "result";
  render();
}

// ---------------- screen: REMEDIATION ----------------

function renderRemediation(){
  const m = getModule(STATE.quiz.moduleId);
  const focusIds = STATE.remediationFocusIds;
  const missedQuestions = m.quiz.questions.filter(q => focusIds.includes(q.id));

  const missedDetailHtml = missedQuestions.map(q => `
    <div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(0,0,0,0.08);">
      <div style="font-weight:600;font-size:14.5px;margin-bottom:6px;">${escapeHtml(q.prompt)}</div>
      <div style="font-size:14px;">${escapeHtml(q.explain)}</div>
      <div style="font-size:12.5px;opacity:.75;font-style:italic;margin-top:6px;">${escapeHtml(q.cite)}</div>
    </div>
  `).join("");

  app.innerHTML = renderTopbar() + `
    <div class="screen">
      <div class="crumbs"><button id="back-module-r">&larr; ${escapeHtml(m.title)}</button></div>

      <div class="remed-card">
        <div class="rtag">Targeted refresher</div>
        <h2>Let's re-teach what you missed</h2>
        <div class="rbody">
          <p>${escapeHtml(m.remediation.intro)}</p>
          ${m.remediation.points.map(p => `<p><strong>${escapeHtml(p.tag)}:</strong> ${escapeHtml(p.text)}</p>`).join("")}
        </div>
      </div>

      <div class="section-label">The specific questions you missed</div>
      <div class="lesson-card" style="padding:24px 26px;">
        ${missedDetailHtml}
      </div>

      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-primary" id="retake-quiz-btn">Take the quiz again &rarr;</button>
      </div>
    </div>
  `;

  document.getElementById("back-module-r").onclick = () => { STATE.screen = "module"; render(); };
  document.getElementById("retake-quiz-btn").onclick = () => {
    // Full retake (not just missed questions) to confirm overall mastery,
    // but flagged as a remediation-round attempt for tracking.
    startQuiz(m.id, true, null);
  };
}

// ---------------- screen: MODERATOR DASHBOARD ----------------

async function renderModerator(){
  app.innerHTML = renderTopbar() + `<div id="mod-body" class="screen"><div class="empty-state">Loading learner records…</div></div>`;
  wireTopbar();

  const rosterRaw = await safeGet("roster:learners", true);
  let learners = [];
  if(rosterRaw){
    try{ learners = JSON.parse(rosterRaw); } catch(e){ learners = []; }
  }

  // pull all shared score records
  const keys = await safeList("score:", true);
  const records = [];
  for(const k of keys){
    const raw = await safeGet(k, true);
    if(raw){
      try{ records.push(JSON.parse(raw)); } catch(e){ /* skip */ }
    }
  }
  records.sort((a,b) => new Date(b.date) - new Date(a.date));

  STATE.allUsers = learners;
  STATE.allScores = records;

  renderModeratorBody("all");
}

function renderModeratorBody(filterModuleId){
  const learners = STATE.allUsers;
  const records = STATE.allScores;

  // best score per learner per module
  const bestMap = {}; // key: learner|moduleId -> record
  records.forEach(r => {
    const key = r.learner.toLowerCase() + "|" + r.moduleId;
    if(!bestMap[key] || r.score > bestMap[key].score){
      bestMap[key] = r;
    }
  });

  const passedTotal = Object.values(bestMap).filter(r => r.passed).length;
  const attemptsTotal = records.length;
  const learnerCount = learners.length;
  const avgScore = records.length ? Math.round(records.reduce((s,r)=>s+r.score,0)/records.length) : null;

  const filterChips = `
    <div class="filter-row">
      <button class="chip-filter ${filterModuleId === "all" ? "active" : ""}" data-mod="all">All modules</button>
      ${MODULES.map(m => `<button class="chip-filter ${filterModuleId === m.id ? "active" : ""}" data-mod="${m.id}">${escapeHtml(m.title)}</button>`).join("")}
    </div>
  `;

  let rows = records;
  if(filterModuleId !== "all"){
    rows = records.filter(r => r.moduleId === filterModuleId);
  }

  const tableRows = rows.length === 0 ? `
    <tr><td colspan="6" style="text-align:center;color:var(--ink-soft);padding:24px;">No quiz attempts recorded yet for this view.</td></tr>
  ` : rows.map(r => `
    <tr>
      <td>${escapeHtml(r.learner)}</td>
      <td>${escapeHtml(r.moduleTitle)}</td>
      <td><span class="score-badge ${r.passed ? "pass" : "fail"}">${r.score}%</span></td>
      <td>${r.passed ? "Passed" : "Not passed"}</td>
      <td>${r.isRemediation ? "Refresher retake" : "Initial attempt"}</td>
      <td>${formatDate(r.date)}</td>
    </tr>
  `).join("");

  document.getElementById("mod-body").innerHTML = `
    <div class="hub-hero">
      <h1>Moderator dashboard</h1>
      <p>Quiz results across all learners. These records are visible only to moderators and to the learner who took each quiz — never shared with other learners.</p>
    </div>

    <div class="stat-strip">
      <div class="stat-card"><div class="n">${learnerCount}</div><div class="l">Learners registered</div></div>
      <div class="stat-card"><div class="n">${attemptsTotal}</div><div class="l">Total quiz attempts</div></div>
      <div class="stat-card"><div class="n">${passedTotal}/${learnerCount * MODULES.length || 0}</div><div class="l">Module passes (best attempts)</div></div>
      <div class="stat-card"><div class="n">${avgScore === null ? "—" : avgScore + "%"}</div><div class="l">Average attempt score</div></div>
    </div>

    <div class="section-label">Filter by module</div>
    ${filterChips}

    <div class="section-label">Attempt history</div>
    <div style="overflow-x:auto;">
      <table class="mod-dash-table">
        <thead>
          <tr><th>Learner</th><th>Module</th><th>Score</th><th>Result</th><th>Type</th><th>Date</th></tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  `;

  document.querySelectorAll(".chip-filter").forEach(chip => {
    chip.onclick = () => {
      renderModeratorBody(chip.getAttribute("data-mod"));
    };
  });
}

// ---------------- utilities ----------------

function escapeHtml(str){
  if(str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function formatDate(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, { month:"short", day:"numeric", year:"numeric" }) + " " +
           d.toLocaleTimeString(undefined, { hour:"numeric", minute:"2-digit" });
  }catch(e){
    return iso;
  }
}

// ---------------- master render ----------------

function render(){
  switch(STATE.screen){
    case "loading":
      app.innerHTML = `<div class="empty-state">Loading…</div>`;
      break;
    case "gate":
      renderGate();
      break;
    case "hub":
      renderHub();
      break;
    case "module":
      renderModuleDetail();
      break;
    case "lesson":
      renderLesson();
      break;
    case "quiz":
      renderQuiz();
      break;
    case "result":
      renderResult();
      break;
    case "remediation":
      renderRemediation();
      break;
    case "moderator":
      renderModerator();
      break;
    default:
      app.innerHTML = `<div class="empty-state">Something went wrong. Please refresh.</div>`;
  }
}

init();

</script>
